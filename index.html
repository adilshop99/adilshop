<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdilShop</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

header{
padding:25px;
font-size:30px;
font-weight:bold;
letter-spacing:2px;
}

.product{
background:white;
color:black;
margin:30px auto;
padding:25px;
width:90%;
max-width:420px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:0.3s;
}

.product:hover{
transform:scale(1.03);
}

.product img{
width:100%;
border-radius:15px;
}

h2{
margin-top:15px;
}

.price{
font-size:24px;
color:red;
font-weight:bold;
margin:15px 0;
}

.btn{
display:inline-block;
margin:10px;
padding:15px 25px;
border-radius:30px;
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
}

.whatsapp{
background:#25D366;
}

.instagram{
background:linear-gradient(45deg,#feda75,#d62976,#962fbf,#4f5bd5);
}

.btn:hover{
opacity:0.8;
}
</style>

</head>
<body>

<header>🔥 ADILSHOP 🔥</header>

<div class="product">
<img src="tool.jpg" alt="Инструмент набор">

<h2>Профессионал инструмент набор (46 бөлүк)</h2>

<p>
Унаа оңдоо жана үй жумуштарына ылайыктуу сапаттуу набор.  
Бекем металл. Узак мөөнөт колдонулат.
</p>

<div class="price">🔥 Акция баа: 1800 сом</div>

<a class="btn whatsapp" href="https://wa.me/996502418518">
📲 WhatsApp аркылуу заказ
</a>

<a class="btn instagram" href="https://instagram.com/">
📸 Instagram баракча
</a>

</div>

</body>
</html>
